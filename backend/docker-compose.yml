version: "3.9"

services:
  backend:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - PORT=3000
      - DB_USER=postgres
      # Inside Docker, use the service name "db" instead of localhost.
      - DB_HOST=db
      - DB_NAME=youth_chat_db
      - DB_PASSWORD=password
      - DB_PORT=5432

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=youth_chat_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
