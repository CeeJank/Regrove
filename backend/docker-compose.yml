services:
  backend:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PORT=3000
      - DB_USER=postgres
      # Inside Docker, use the service name "db" instead of localhost.
      - DB_HOST=db
      - DB_NAME=youth_chat_db
      - DB_PASSWORD=password
      - DB_PORT=5432

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=youth_chat_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d youth_chat_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-full-db.sh:/docker-entrypoint-initdb.d/00-init-full-db.sh
      - ./database/Dell_full_schema.backup:/db-assets/Dell_full_schema.backup
      - ./database/regrove_mock_db.sql:/db-assets/regrove_mock_db.sql

volumes:
  postgres_data:
